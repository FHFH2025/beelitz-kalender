name: Beelitz-Kalender aktualisieren

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "scrape_beelitz.py"
      - "requirements.txt"
      - ".github/workflows/update-calendar.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Repository laden
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Kalender erzeugen
        run: python scrape_beelitz.py

      - name: Geänderte ICS-Datei speichern
        run: |
          if git diff --quiet -- public/beelitz.ics; then
            echo "Keine Kalenderänderung."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/beelitz.ics
            git commit -m "Beelitz-Kalender aktualisieren"
            git push
          fi

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v5
